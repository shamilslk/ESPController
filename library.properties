name=ESPController
version=2.0.0
author=Shamil K, Vismaya P
maintainer=Shamil K, Vismaya P
sentence=Universal ESP controller library. Works on ESP32-CAM, ESP32, ESP32-S3, and ESP8266.
paragraph=One library for all ESP boards. Auto-detects your board from the compiler toolchain — no manual board selection needed for standard setups. Handles WiFi AP/STA (with automatic STA-to-AP fallback), WebSocket control, camera streaming (ESP32-CAM), PWM or digitalWrite motors, soft acceleration ramp, watchdog, mDNS, RSSI broadcast, battery monitor, addressable RGB NeoPixel status LED (auto-enabled on ESP32-S3), flash LED, and status LED. All features configured with compile-time flags.
category=Communication
url=https://github.com/shamilslk/ESPController
architectures=esp32,esp8266
depends=ESPAsyncWebServer,Adafruit NeoPixel
